<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        /* Membuat background dengan gradien warna */
        body {
            background: linear-gradient(to right, #5a98f5, #75a5ff); /* Gradien dari pink ke orange */
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* Memberikan efek shadow pada header */
        h1 {
            font-size: 3em;
            margin-top: 50px;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.5);
            letter-spacing: 3px;
        }

        /* Styling untuk paragraf */
        p {
            font-size: 1.5em;
            line-height: 1.6;
            margin-top: 20px;
            padding: 0 20px;
        }

        /* Tambahkan efek hover pada header */
        h1:hover {
            color: #91b1f8; /* Ganti warna teks saat hover */
            transform: scale(1.1); /* Membesarkan teks saat hover */
            transition: all 0.3s ease-in-out;
        }

        /* Memberikan desain pada link jika ada */
        a {
            color: #87b7f5;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
        }

        a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>SELAMAT DATANG!</h1>
    <p>Terima kasih telah bergabung di Website Kami. Media Belajar kita bersama!</p>
</body>
</html>
